<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <style>
   body {
  font-family: Arial, sans-serif;
  background: #dadace; /* same as site background */
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.login-container {
  background: #fff;
  padding: 30px;
  border-radius: 8px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  width: 320px;
  border-top: 6px solid #969485; /* subtle theme accent */
}

.login-container h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333; /* matches site text color */
}

.login-container input {
  width: 93%;
  padding: 10px;
  margin: 10px 0;
  border: 1px solid #87877b; /* theme border */
  border-radius: 5px;
  background: #f9f9f7;
}

.login-container input:focus {
  border-color: #969485;
  outline: none;
}

.login-container button {
  width: 100%;
  padding: 12px;
  background: #969485; /* navbar color */
  border: none;
  border-radius: 5px;
  color: #fff;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.3s ease;
}

.login-container button:hover {
  background: #f6c343; /* hover accent */
  color: #333;
}</style>

</head>
<body>
    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HealNest Admin Login</title>
<body>
  <div class="login-container">
    <h2>Admin Login</h2>
    <form action="/admin/login" method="POST">
      <input type="text" name="username" placeholder="Username or Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
